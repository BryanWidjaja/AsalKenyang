services:
  db:
    image: postgres:17-alpine
    container_name: asalkenyang-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: asalkenyang
      POSTGRES_PASSWORD: asalkenyang
      POSTGRES_DB: asalkenyang
    ports:
      - "5432:5432"
    volumes:
      - asalkenyang_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asalkenyang"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  asalkenyang_pgdata:
